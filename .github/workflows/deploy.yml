name: Deploy

on:
  workflow_dispatch:
    # 入力パラメータを追加
    inputs:
      environment-name:
        # 入力パラメータで Environments を指定
        type: environment
        required: true
        description: Environment name

env:
  ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ID }}:role/${{ secrets.ROLE_NAME }}
  SESSION_NAME: gh-oidc-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  deploy:
    environment: ${{ inputs.environment-name }} # Environments の指定を追加
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Mask infrastructure identifiers
        shell: bash
        run: |
          echo "::add-mask::${{ vars.ECR_REPOSITORY_URI }}"
          echo "::add-mask::${{ vars.ECS_CLUSTER_NAME }}"
          echo "::add-mask::${{ vars.ECS_SERVICE_NAME }}"
          echo "::add-mask::${{ vars.TASK_DEFINITION_NAME }}"
          echo "::add-mask::${{ vars.CONTAINER_NAME }}"
      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: ${{ env.SESSION_NAME }}
          aws-region: ${{ vars.AWS_REGION }}
          allowed-account-ids: ${{ secrets.AWS_ID }}
      - uses: ./.github/actions/container-build/
        id: build
        with:
          ecr-repository-uri: ${{ vars.ECR_REPOSITORY_URI }}
          dockerfile-path: docker/ecs/
      - uses: ./.github/actions/container-deploy/
        with:
          ecs-cluster: ${{ vars.ECS_CLUSTER_NAME }}
          ecs-service: ${{ vars.ECS_SERVICE_NAME }}
          task-definition: ${{ vars.TASK_DEFINITION_NAME }}
          container-name: ${{ vars.CONTAINER_NAME }}
          container-image: ${{ steps.build.outputs.container-image }}
